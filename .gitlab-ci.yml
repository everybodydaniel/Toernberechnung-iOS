stages:
  - quality
  - build
  - test
  - docs

variables:
  DESTINATION: "platform=iOS Simulator,name=iPhone 17,OS=26.4.1"

swiftlint:
  stage: quality
  tags:
    - macos
  before_script:
    - if ! command -v swiftlint >/dev/null 2>&1; then brew install swiftlint; fi
  script:
    - ./scripts/lint.sh
  artifacts:
    when: always
    paths:
      - reports/swiftlint.json

build:
  stage: build
  tags:
    - macos
  script:
    - ./scripts/build.sh

tests:
  stage: test
  tags:
    - macos
  script:
    - ./scripts/test.sh

api_docs:
  stage: docs
  tags:
    - macos
  script:
    - ./scripts/docs.sh
  artifacts:
    when: always
    paths:
      - docs/api
