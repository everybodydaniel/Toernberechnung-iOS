included:
  - Toernberechnung
  - ToernberechnungTests

excluded:
  - Toernberechnung.xcodeproj
  - .build
  - DerivedData
  - Pods
  - vendor

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_string
  - fatal_error_message
  - first_where
  - modifier_order
  - overridden_super_call
  - private_action
  - redundant_nil_coalescing
  - sorted_first_last
  - yoda_condition

disabled_rules:
  - trailing_whitespace
  - todo
  - opening_brace
  - force_try
  - multiple_closures_with_trailing_closure
  - trailing_comma
  - non_optional_string_data_conversion

line_length:
  warning: 200
  error: 250
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 450
  error: 600

function_body_length:
  warning: 80
  error: 150

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

function_parameter_count:
  warning: 6
  error: 8

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60
  allowed_symbols: ["_"]

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - n
    - a
    - v
    - cg
    - hw
    - lt
    - f

nesting:
  type_level: 3
  function_level: 5

cyclomatic_complexity:
  warning: 20
  error: 30

large_tuple:
  warning: 3
  error: 4

reporter: "xcode"
