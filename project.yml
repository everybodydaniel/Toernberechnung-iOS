name: Toernberechnung
options:
  bundleIdPrefix: com.toernberechnung
  minimumXcodeGenVersion: "2.30"
  groupSortPosition: top

packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: 6.25.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

targets:
  Toernberechnung:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Toernberechnung/ToernberechnungApp.swift
      - path: Toernberechnung/Views/ContentView.swift
      - path: Toernberechnung/Views/MapView.swift
      - path: Toernberechnung/Engine/PassageCalculator.swift
      - path: Toernberechnung/Services/DWDService.swift
    dependencies:
      - package: MapLibre
        product: MapLibre
      - package: ZIPFoundation
        product: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toernberechnung.ios
        INFOPLIST_FILE: Toernberechnung/Info.plist
        SWIFT_VERSION: "5.9"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
