# ──────────────────────────────────────────────────────────────
# GitHub Actions CI – Toernberechnung iOS
# ──────────────────────────────────────────────────────────────
# Trigger: Push & Pull Request auf main
# Jobs:    1. SwiftLint   2. Build & Test   3. SonarCloud   4. DocC
#
# Alle Actions sind auf volle Commit-SHAs gepinnt (Supply-Chain-Sicherheit).
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────
  # Job 1: SwiftLint
  # ─────────────────────────────────────────
  swiftlint:
    name: 🧹 SwiftLint
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging

  # ─────────────────────────────────────────
  # Job 2: Build & Test
  # ─────────────────────────────────────────
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: macos-latest
    needs: swiftlint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Toernberechnung.xcodeproj \
            -scheme Toernberechnung

      - name: Build Project
        run: |
          xcodebuild build \
            -project Toernberechnung.xcodeproj \
            -scheme Toernberechnung \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project Toernberechnung.xcodeproj \
            -scheme Toernberechnung \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: build/reports/
          retention-days: 14

  # ─────────────────────────────────────────
  # Job 3: SonarCloud
  # ─────────────────────────────────────────
  sonarcloud:
    name: 📊 SonarCloud Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Download Test Results
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: test-results
          path: build/reports/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=everybodydaniel_Toernberechnung-iOS
            -Dsonar.organization=everybodydaniel
            -Dsonar.sources=Toernberechnung
            -Dsonar.tests=ToernberechnungTests
            -X

